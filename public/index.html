<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shmordle</title>
    <!-- materialize css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
</head>
<body class="grey lighten-4">
    <nav>
      <div class="nav-wrapper blue darken-2">
        <a href="#" class="brand-logo center">Shmordle</a>
      </div>
    </nav>

    <div class="container" style="margin-top: 3rem;">
      <div class="row">
        <div class="col s12 m8 offset-m2">
          <div class="card">
            <div class="card-content">
              <span class="card-title">Make a Guess</span>
              <div class="input-field">
                <input id="guessInput" type="text" class="validate" autocomplete="off" />
                <label for="guessInput">Enter a 5-letter word</label>
              </div>
              <div class="section">
                <button id="guessBtn" class="btn waves-effect waves-light blue darken-2">Guess</button>
                <button id="clearHistory" class="btn-flat red-text">Clear history</button>
              </div>
              <div class="section">
                <div id="guessResult" class="guess-result"></div>
              </div>
            </div>
          </div>

          <div class="section">
            <h5>Guess History</h5>
            <div id="history"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="/client.js"></script>
</body>
</html>
